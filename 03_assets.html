<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CRS'PY — Asset Inventory</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#050c0a; --bg2:#0a1512; --bg3:#0f1e18;
  --teal:#2ee8b0; --teal-dim:#1bc48a; --teal-dark:#0f6e56; --teal-muted:#1a3d30;
  --text:#e8f5f0; --text-muted:#7aaa96; --text-faint:#3a5e50;
  --border:rgba(46,232,176,0.12); --border-md:rgba(46,232,176,0.22); --sw:220px;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;}
.sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sw);background:var(--bg2);border-right:0.5px solid var(--border);display:flex;flex-direction:column;z-index:100;padding-bottom:24px;}
.sb-brand{padding:28px 20px 22px;border-bottom:0.5px solid var(--border);}
.wm{font-family:'Playfair Display',serif;font-weight:900;font-size:18px;color:#fff;text-transform:uppercase;line-height:1.1;}
.wm span{color:var(--teal);}
.sub{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-faint);margin-top:4px;}
.nav-sec{padding:16px 12px 4px;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-faint);}
.nl{display:flex;align-items:center;gap:10px;padding:10px 20px;color:var(--text-muted);text-decoration:none;font-size:13px;border-left:2px solid transparent;transition:all .18s;}
.nl:hover{color:var(--text);background:rgba(46,232,176,.05);}
.nl.active{color:var(--teal);background:rgba(46,232,176,.08);border-left-color:var(--teal);font-weight:500;}
.nl .ic{font-size:15px;width:18px;text-align:center;}
.sb-foot{margin-top:auto;padding:16px 20px 0;border-top:0.5px solid var(--border);}
.ur{display:flex;align-items:center;gap:10px;}
.av{width:32px;height:32px;border-radius:50%;background:var(--teal-muted);border:1.5px solid var(--teal-dark);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--teal);}
.un{font-size:12px;font-weight:500;color:var(--text);}
.ur2{font-size:11px;color:var(--text-faint);}
.main{margin-left:var(--sw);display:flex;flex-direction:column;min-height:100vh;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 32px;border-bottom:0.5px solid var(--border);position:sticky;top:0;z-index:50;background:var(--bg);}
.topbar-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#fff;}
.glow-bar{height:3px;background:linear-gradient(to right,var(--teal) 0%,var(--teal-dim) 60%,transparent 100%);opacity:.55;}
.content{padding:28px 32px;flex:1;}
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap;}
.search-wrap{position:relative;}
.search-wrap input{padding:9px 14px 9px 34px;background:var(--bg3);border:0.5px solid var(--border);border-radius:8px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;outline:none;width:220px;transition:border-color .2s,box-shadow .2s;}
.search-wrap input::placeholder{color:var(--text-faint);}
.search-wrap input:focus{border-color:var(--teal);box-shadow:0 0 0 2px rgba(46,232,176,.1);}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--text-faint);}
.filters{display:flex;gap:8px;}
select{padding:8px 12px;background:var(--bg3);border:0.5px solid var(--border);border-radius:8px;color:var(--text-muted);font-family:'Inter',sans-serif;font-size:12px;outline:none;cursor:pointer;}
select:focus{border-color:var(--teal);}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border:none;text-decoration:none;transition:all .18s;}
.btn-primary{background:linear-gradient(135deg,var(--teal),var(--teal-dim));color:#042c1e;}
.btn-primary:hover{opacity:.88;}
.table-wrap{background:var(--bg2);border:0.5px solid var(--border);border-radius:14px;overflow:hidden;}
table{width:100%;border-collapse:collapse;}
thead th{padding:12px 16px;text-align:left;font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--text-faint);border-bottom:0.5px solid var(--border);white-space:nowrap;}
tbody tr{border-bottom:0.5px solid var(--border);transition:background .15s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:rgba(46,232,176,.04);cursor:pointer;}
tbody td{padding:12px 16px;font-size:13px;color:var(--text-muted);}
.td-p{color:var(--text);font-weight:500;}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;}
.bg{background:rgba(46,232,176,.12);color:var(--teal);}
.ba{background:rgba(239,159,39,.12);color:#ef9f27;}
.br{background:rgba(226,75,74,.12);color:#e24b4a;}
.bb{background:rgba(55,138,221,.12);color:#378add;}
.bgr{background:rgba(136,135,128,.12);color:#888780;}
.action-btn{background:transparent;border:0.5px solid var(--border-md);color:var(--text-muted);padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;}
.action-btn:hover{border-color:var(--teal);color:var(--teal);}
.stat-mini{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.sm{background:var(--bg2);border:0.5px solid var(--border);border-radius:10px;padding:14px 18px;}
.sm-l{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-faint);}
.sm-v{font-size:22px;font-weight:600;color:var(--teal);margin-top:4px;}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sb-brand">
    <div class="wm">CRS<span>'</span>PY<br>TECH LENDERS</div>
    <div class="sub">IT Asset Management</div>
  </div>
  <div class="nav-sec">Main</div>
  <a href="02_dashboard.html" class="nl"><span class="ic">⊞</span> Dashboard</a>
  <div class="nav-sec">Manage</div>
  <a href="03_assets.html" class="nl active"><span class="ic">🖥</span> Asset Inventory</a>
  <a href="04_lending.html" class="nl"><span class="ic">↔</span> Lending Tracker</a>
  <a href="05_users.html" class="nl"><span class="ic">👤</span> Users</a>
  <div class="nav-sec">Insights</div>
  <a href="06_reports.html" class="nl"><span class="ic">📊</span> Reports</a>
  <div class="sb-foot">
    <div class="ur">
      <div class="av">AD</div>
      <div><div class="un">Admin</div><div class="ur2">IT Manager</div></div>
    </div>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <span class="topbar-title">Asset Inventory</span>
    <button class="btn btn-primary" onclick="showAddModal()">+ Add Asset</button>
  </div>
  <div class="glow-bar"></div>

  <div class="content">
    <div class="stat-mini">
      <div class="sm"><div class="sm-l">Total</div><div class="sm-v">284</div></div>
      <div class="sm"><div class="sm-l">Available</div><div class="sm-v" style="color:var(--teal)">231</div></div>
      <div class="sm"><div class="sm-l">Lent Out</div><div class="sm-v" style="color:#ef9f27">47</div></div>
      <div class="sm"><div class="sm-l">Retired</div><div class="sm-v" style="color:#888780">6</div></div>
    </div>

    <div class="toolbar">
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
        <div class="search-wrap">
          <span class="si">🔍</span>
          <input type="text" id="srch" placeholder="Search assets…" oninput="filterTable()" />
        </div>
        <div class="filters">
          <select id="catFilter" onchange="filterTable()">
            <option value="">All Categories</option>
            <option>Laptop</option><option>Monitor</option><option>Tablet</option>
            <option>Networking</option><option>Printer</option><option>Other</option>
          </select>
          <select id="statFilter" onchange="filterTable()">
            <option value="">All Status</option>
            <option>Available</option><option>Lent</option><option>Maintenance</option><option>Retired</option>
          </select>
        </div>
      </div>
      <span id="count" style="font-size:12px;color:var(--text-faint);"></span>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Asset ID</th><th>Name</th><th>Category</th><th>Brand</th>
            <th>Serial No.</th><th>Condition</th><th>Status</th><th>Actions</th>
          </tr>
        </thead>
        <tbody id="assetBody">
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Add Asset Modal -->
<div id="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:none;align-items:center;justify-content:center;">
  <div style="background:var(--bg2);border:0.5px solid var(--border-md);border-radius:16px;padding:28px 32px;width:480px;max-width:95vw;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;">
      <span style="font-size:16px;font-weight:600;color:var(--text);">Add New Asset</span>
      <button onclick="closeModal()" style="background:none;border:none;color:var(--text-faint);font-size:18px;cursor:pointer;">✕</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
      <div><label style="font-size:11px;color:var(--text-muted);display:block;margin-bottom:5px;">Asset Name</label><input placeholder="e.g. Dell XPS 15" style="width:100%;padding:9px 12px;background:var(--bg3);border:0.5px solid var(--border);border-radius:8px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;outline:none;" /></div>
      <div><label style="font-size:11px;color:var(--text-muted);display:block;margin-bottom:5px;">Category</label><select style="width:100%;padding:9px 12px;background:var(--bg3);border:0.5px solid var(--border);border-radius:8px;color:var(--text-muted);font-family:'Inter',sans-serif;font-size:13px;outline:none;"><option>Laptop</option><option>Monitor</option><option>Tablet</option><option>Networking</option><option>Printer</option><option>Other</option></select></div>
      <div><label style="font-size:11px;color:var(--text-muted);display:block;margin-bottom:5px;">Brand</label><input placeholder="e.g. Dell" style="width:100%;padding:9px 12px;background:var(--bg3);border:0.5px solid var(--border);border-radius:8px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;outline:none;" /></div>
      <div><label style="font-size:11px;color:var(--text-muted);display:block;margin-bottom:5px;">Serial No.</label><input placeholder="SN-XXXXX" style="width:100%;padding:9px 12px;background:var(--bg3);border:0.5px solid var(--border);border-radius:8px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;outline:none;" /></div>
    </div>
    <div style="margin-top:20px;display:flex;justify-content:flex-end;gap:10px;">
      <button onclick="closeModal()" style="padding:9px 18px;border-radius:8px;border:0.5px solid var(--border-md);background:transparent;color:var(--text-muted);font-family:'Inter',sans-serif;cursor:pointer;">Cancel</button>
      <button onclick="closeModal()" class="btn btn-primary" style="padding:9px 18px;">Save Asset</button>
    </div>
  </div>
</div>

<script>
const assets = [
  {id:'AST-001',name:'Dell XPS 15',cat:'Laptop',brand:'Dell',sn:'SN-48291',cond:'Good',status:'Lent'},
  {id:'AST-002',name:'MacBook Air M3',cat:'Laptop',brand:'Apple',sn:'SN-77302',cond:'Excellent',status:'Available'},
  {id:'AST-003',name:'iPad Pro 12.9',cat:'Tablet',brand:'Apple',sn:'SN-39201',cond:'Good',status:'Lent'},
  {id:'AST-004',name:'HP 27" Monitor',cat:'Monitor',brand:'HP',sn:'SN-50112',cond:'Good',status:'Available'},
  {id:'AST-005',name:'Cisco SG350 Switch',cat:'Networking',brand:'Cisco',sn:'SN-62019',cond:'Good',status:'Lent'},
  {id:'AST-006',name:'HP LaserJet M404',cat:'Printer',brand:'HP',sn:'SN-11233',cond:'Fair',status:'Lent'},
  {id:'AST-007',name:'Lenovo ThinkPad X1',cat:'Laptop',brand:'Lenovo',sn:'SN-84422',cond:'Excellent',status:'Available'},
  {id:'AST-008',name:'Samsung 32" Monitor',cat:'Monitor',brand:'Samsung',sn:'SN-29301',cond:'Good',status:'Available'},
  {id:'AST-009',name:'Ubiquiti AP AC Pro',cat:'Networking',brand:'Ubiquiti',sn:'SN-71920',cond:'Good',status:'Available'},
  {id:'AST-010',name:'Dell Latitude 5540',cat:'Laptop',brand:'Dell',sn:'SN-55033',cond:'Fair',status:'Maintenance'},
  {id:'AST-011',name:'Surface Pro 9',cat:'Tablet',brand:'Microsoft',sn:'SN-38801',cond:'Excellent',status:'Available'},
  {id:'AST-012',name:'Canon imageRUNNER',cat:'Printer',brand:'Canon',sn:'SN-90011',cond:'Poor',status:'Retired'},
];
const statusBadge = {Available:'bg',Lent:'ba',Maintenance:'bb',Retired:'bgr'};
const condColor = {Excellent:'var(--teal)',Good:'var(--text)',Fair:'#ef9f27',Poor:'#e24b4a'};

function renderTable(list){
  const tb = document.getElementById('assetBody');
  tb.innerHTML = list.map(a=>`<tr>
    <td style="color:var(--teal);font-size:12px;">${a.id}</td>
    <td class="td-p">${a.name}</td>
    <td>${a.cat}</td><td>${a.brand}</td>
    <td style="font-family:monospace;font-size:12px;">${a.sn}</td>
    <td style="color:${condColor[a.cond]}">${a.cond}</td>
    <td><span class="badge ${statusBadge[a.status]}">${a.status}</span></td>
    <td><button class="action-btn">Edit</button></td>
  </tr>`).join('');
  document.getElementById('count').textContent = list.length + ' assets';
}

function filterTable(){
  const q = document.getElementById('srch').value.toLowerCase();
  const cat = document.getElementById('catFilter').value;
  const st = document.getElementById('statFilter').value;
  const filtered = assets.filter(a=>{
    const matchQ = !q || a.name.toLowerCase().includes(q) || a.id.toLowerCase().includes(q) || a.brand.toLowerCase().includes(q);
    const matchC = !cat || a.cat===cat;
    const matchS = !st || a.status===st;
    return matchQ && matchC && matchS;
  });
  renderTable(filtered);
}

function showAddModal(){ document.getElementById('modal').style.display='flex'; }
function closeModal(){ document.getElementById('modal').style.display='none'; }

renderTable(assets);
</script>
</body>
</html>
